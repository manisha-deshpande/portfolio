<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manisha - Resume</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">

</head>
<body>

<header>
    <div class="resume-toggle">
        <button id="simple-btn" class="active">Professional</button>
        <button id="colorful-btn">Creative</button>
    </div>
</header>

<section id="resume-container">
    <!--View 1: Simple Resume-->
    <div id="simple-resume" class="resume-version">

        <div class="col-md-4">
            <h1 id="name"></h1>
            <p>Tempe, AZ </p>
            <p id="phone-container">
                <span id="phone-display">XXX-XXX-XXXX</span>
                <i class="bi bi-eye" id="reveal-phone">&#xF341;</i>

            </p>
        </div>
        <section id="education" class="mb-5">
            <h2>Education</h2>
            <div id="education-list"></div>
        </section>
        <section id="experience" class="mb-5">
            <h2>Work Experience</h2>
            <div id="experience-list"></div>
        </section>

    </div>
    <!--View 2: Extraa Resume-->
    <div id="colorful-resume" class="resume-version" style="display: none;">
        <div class="col-md-4">
            <h1 id="name"></h1>
            <p>Tempe, AZ </p>
            <p id="phone-container">
                <span id="phone-display">XXX-XXX-XXXX</span>
                <i class="bi bi-eye" id="reveal-phone">&#xF341;</i>

            </p>
        </div>
        <section id="education" class="mb-5">
            <h2>Education</h2>
            <div id="education-list"></div>
        </section>
        <section id="experience" class="mb-5">
            <h2>Work Experience</h2>
            <div id="experience-list"></div>
        </section>
    </div>
</section>






<footer>
    <p>&copy; 2024 Manisha Deshpande</p>
</footer>

<script src="script.js"></script>
</body>
</html>
